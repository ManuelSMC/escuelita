name: CI/CD Pipeline - Escuelita

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  sonarqube:
    name: 1. Análisis de Calidad (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=escuelita
            -Dsonar.qualitygate.wait=true

  k6:
    name: 2. Prueba de Rendimiento (K6)
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar dependencias de la app
        run: npm install
      - name: Iniciar app en background
        run: |
          node src/server.js &
          echo $! > app.pid
      - name: Esperar que la app inicie
        run: |
          sleep 8
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000/api/alumnos
      - name: Ejecutar pruebas K6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load_test.js

  build-and-push:
    name: 3. Empaquetado (Docker + GHCR)
    needs: k6
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: 4. Despliegue Automático (CD)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy al docker-server via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop escuelita || true
            docker rm escuelita || true
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            docker run -d \
              --name escuelita \
              --restart always \
              -p 8080:3000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
